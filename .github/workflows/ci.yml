name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Run pytest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit + HTTP-layer tests
        # Integration tests (tests/integration/) require live Supabase credentials
        # and are skipped here — they auto-skip when TEST_SUPABASE_URL is absent.
        run: pytest tests/ --ignore=tests/integration -v --tb=short
        env:
          # Minimal env so config.py and route imports don't crash at import time.
          # These are fake values — the test suite mocks all external calls.
          SUPABASE_URL: "https://fake.supabase.co"
          SUPABASE_ANON_KEY: "fake-anon-key"
          SUPABASE_SERVICE_KEY: "fake-service-key"
          ANTHROPIC_API_KEY: "fake-anthropic-key"
          JWT_SECRET: "fake-jwt-secret"
          ENV: "development"
