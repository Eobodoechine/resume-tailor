[pytest]
testpaths = tests
# pythonpath = .  requires pytest >= 7.0
# Add backend/ dir to sys.path by running: pytest from the backend/ directory
# e.g.  cd backend && pytest
pythonpath = .
# pytest-asyncio: auto mode so `@pytest.mark.asyncio` / `async def test_*` tests
# actually execute instead of being silently skipped or erroring (T2).
asyncio_mode = auto
