<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History — Resume Tailor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav>
  <a href="/dashboard" class="nav-brand">Resume Tailor</a>
  <div class="nav-links">
    <a href="/dashboard">Home</a>
    <a href="/tailor">Tailor</a>
    <a href="/improve">Improve</a>
    <a href="/history" class="active">History</a>
    <a href="/profile">Profile</a>
    <a href="/admin" id="admin-nav-link" style="display:none">Admin</a>
    <a href="#" onclick="logout()">Sign Out</a>
  </div>
</nav>

<div class="container">
  <div style="margin-bottom:24px;">
    <h1 style="font-size:22px;font-weight:700;color:var(--navy)">Resume History</h1>
    <p style="color:var(--muted);font-size:14px;margin-top:4px;">Every tailored resume you've generated. Download any as a PDF.</p>
  </div>

  <div class="card" style="padding:0;overflow:hidden;">
    <table>
      <thead>
        <tr>
          <th>Role</th>
          <th>Company</th>
          <th>Date</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="history-body">
        <tr><td colspan="4" style="text-align:center;color:var(--muted);padding:24px;">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <div id="load-more-wrap" style="display:none;text-align:center;margin-top:16px;">
    <button class="btn btn-outline" id="btn-load-more" onclick="loadMore()">Load More</button>
    <p id="history-count" style="font-size:12px;color:var(--muted);margin-top:6px;"></p>
  </div>
</div>

<script src="/static/app.js?v=11"></script>
<script>
  requireAuth();

  const PAGE_SIZE   = 50;
  let currentOffset = 0;
  let totalCount    = 0;

  // Build a table row with DOM APIs — never innerHTML with user-supplied data.
  // dataset assignment handles all attribute escaping automatically.
  function createRow(r) {
    const tr = document.createElement("tr");

    const tdRole = document.createElement("td");
    tdRole.style.fontWeight = "500";
    tdRole.textContent = r.job_title || "—";

    const tdCompany = document.createElement("td");
    tdCompany.textContent = r.company || "—";

    const tdDate = document.createElement("td");
    tdDate.style.color = "var(--muted)";
    tdDate.textContent = fmtDate(r.created_at);

    const tdBtn = document.createElement("td");
    tdBtn.style.textAlign = "right";
    tdBtn.style.whiteSpace = "nowrap";

    const editBtn = document.createElement("button");
    editBtn.className = "btn btn-outline btn-edit-record";
    editBtn.style.cssText = "font-size:12px;padding:5px 12px;margin-right:6px";
    editBtn.dataset.id = r.id;
    editBtn.textContent = "Edit";
    tdBtn.appendChild(editBtn);

    const btn = document.createElement("button");
    btn.className = "btn btn-outline btn-download-pdf";
    btn.style.cssText = "font-size:12px;padding:5px 12px";
    btn.dataset.id      = r.id;
    btn.dataset.company = r.company    || "";
    btn.dataset.role    = r.job_title  || "";
    btn.textContent = "PDF";
    tdBtn.appendChild(btn);

    tr.append(tdRole, tdCompany, tdDate, tdBtn);
    return tr;
  }

  async function loadHistory() {
    currentOffset = 0;
    const tbody = document.getElementById("history-body");
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:24px;">Loading...</td></tr>`;

    try {
      const data = await apiFetch(`/api/tailor/history?limit=${PAGE_SIZE}&offset=0`);
      totalCount    = data.total ?? 0;
      currentOffset = data.items.length;

      if (!data.items.length) {
        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:24px;">
          No tailored resumes yet. <a href="/tailor" style="color:var(--blue)">Create your first one.</a>
        </td></tr>`;
        document.getElementById("load-more-wrap").style.display = "none";
        return;
      }

      tbody.innerHTML = "";
      data.items.forEach(r => tbody.appendChild(createRow(r)));
      updateLoadMore(data.has_more);
    } catch (e) {
      if (e && e.redirecting) return;
      tbody.innerHTML =
        `<tr><td colspan="4" style="text-align:center;color:var(--red)">${e.message}</td></tr>`;
    }
  }

  async function loadMore() {
    const btn = document.getElementById("btn-load-more");
    btn.disabled = true;
    btn.textContent = "Loading…";
    try {
      const data = await apiFetch(`/api/tailor/history?limit=${PAGE_SIZE}&offset=${currentOffset}`);
      totalCount     = data.total ?? totalCount;
      currentOffset += data.items.length;
      const tbody = document.getElementById("history-body");
      data.items.forEach(r => tbody.appendChild(createRow(r)));
      updateLoadMore(data.has_more);
    } catch (e) {
      if (e && e.redirecting) return;
      alert(e.message);
    } finally {
      btn.disabled    = false;
      btn.textContent = "Load More";
    }
  }

  function updateLoadMore(hasMore) {
    const wrap = document.getElementById("load-more-wrap");
    wrap.style.display = hasMore ? "block" : "none";
    document.getElementById("history-count").textContent =
      `Showing ${currentOffset} of ${totalCount}`;
  }

  async function downloadPDF(id, company, role) {
    try {
      const c = safeFilePart(company) || "tailored";
      const r = safeFilePart(role)    || "resume";
      const filename = `${c}_${r}.pdf`;
      await apiDownload(`/api/tailor/${id}/pdf`, filename);
    } catch (e) {
      if (e && e.redirecting) return;
      alert(e.message);
    }
  }

  loadHistory();

  // Event delegation for PDF download buttons — avoids onclick injection risk
  document.getElementById("history-body").addEventListener("click", function(e) {
    const btn = e.target.closest(".btn-download-pdf");
    if (!btn) return;
    const id      = btn.dataset.id;
    const company = btn.dataset.company || "";
    const role    = btn.dataset.role    || "";
    downloadPDF(id, company, role);
  });

  // Event delegation for Edit buttons
  document.getElementById("history-body").addEventListener("click", function(e) {
    const btn = e.target.closest(".btn-edit-record");
    if (!btn) return;
    const id = btn.dataset.id;
    window.location.href = "/tailor?edit=" + encodeURIComponent(id);
  });
</script>
</body>
</html>
