<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Tailor — Get In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="hero">
  <h1>Resume Tailor</h1>
  <p>Upload your resume once. Tailor it to any job in seconds. Get the PDF.</p>
</div>

<div class="auth-box">

  <!-- Tab toggle -->
  <div style="display:flex; border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:20px;">
    <button id="tab-login" onclick="showTab('login')"
      style="flex:1;padding:10px;border:none;background:var(--navy);color:white;font-size:14px;font-weight:500;cursor:pointer;">
      Sign In
    </button>
    <button id="tab-request" onclick="showTab('request')"
      style="flex:1;padding:10px;border:none;background:white;color:var(--muted);font-size:14px;font-weight:500;cursor:pointer;">
      Request Access
    </button>
  </div>

  <div id="alert-box"></div>

  <!-- LOGIN PANEL -->
  <div id="panel-login" class="card">
    <h2>Sign in to your account</h2>
    <p style="font-size:14px;color:var(--muted);margin-bottom:18px;">Enter your email and we'll send you a magic link — no password needed.</p>

    <label>Email address</label>
    <input type="email" id="login-email" placeholder="you@email.com">

    <button class="btn btn-primary" style="width:100%" onclick="sendMagicLink()">
      Send Magic Link
    </button>

    <div style="text-align:center;margin-top:16px;">
      <span style="font-size:13px;color:var(--muted);">— or —</span>
    </div>

    <button class="btn btn-outline" style="width:100%;margin-top:12px;justify-content:center" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </div>

  <!-- REQUEST ACCESS PANEL -->
  <div id="panel-request" class="card" style="display:none;">
    <h2>Request access</h2>
    <p style="font-size:14px;color:var(--muted);margin-bottom:18px;">Fill in your details and you'll be notified when you're approved.</p>

    <label>Full name</label>
    <input type="text" id="req-name" placeholder="Jane Smith">

    <label>Email address</label>
    <input type="email" id="req-email" placeholder="you@email.com">

    <label>Why do you want access? (optional)</label>
    <textarea id="req-reason" placeholder="I'm job searching and..."></textarea>

    <button class="btn btn-navy" style="width:100%" onclick="requestAccess()">
      Submit Request
    </button>
  </div>

</div>

<script src="/static/app.js"></script>
<script>
  // If already logged in, go straight to dashboard
  if (getToken()) window.location.href = "/dashboard";

  function showTab(tab) {
    document.getElementById("panel-login").style.display   = tab === "login"   ? "block" : "none";
    document.getElementById("panel-request").style.display = tab === "request" ? "block" : "none";
    document.getElementById("tab-login").style.background   = tab === "login"   ? "var(--navy)" : "white";
    document.getElementById("tab-login").style.color        = tab === "login"   ? "white" : "var(--muted)";
    document.getElementById("tab-request").style.background = tab === "request" ? "var(--navy)" : "white";
    document.getElementById("tab-request").style.color      = tab === "request" ? "white" : "var(--muted)";
  }

  async function sendMagicLink() {
    const email = document.getElementById("login-email").value.trim();
    if (!email) return showAlert("alert-box", "Please enter your email.", "error");
    try {
      const res = await fetch("/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Error");
      showAlert("alert-box", `✓ ${data.message}`, "success");
    } catch (e) {
      showAlert("alert-box", e.message, "error");
    }
  }

  async function signInGoogle() {
    // Redirect to Supabase Google OAuth
    // Replace YOUR_SUPABASE_URL with your actual project URL
    const SUPABASE_URL = window.__SUPABASE_URL__ || "";
    if (!SUPABASE_URL) {
      showAlert("alert-box", "Google sign-in not configured yet. Use the magic link for now.", "info");
      return;
    }
    const redirect = encodeURIComponent(window.location.origin + "/");
    window.location.href = `${SUPABASE_URL}/auth/v1/authorize?provider=google&redirect_to=${redirect}`;
  }

  async function requestAccess() {
    const name   = document.getElementById("req-name").value.trim();
    const email  = document.getElementById("req-email").value.trim();
    const reason = document.getElementById("req-reason").value.trim();
    if (!email) return showAlert("alert-box", "Please enter your email.", "error");
    try {
      const res = await fetch("/api/auth/request-access", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, full_name: name, reason })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Error");
      showAlert("alert-box", `✓ ${data.message}`, "success");
    } catch (e) {
      showAlert("alert-box", e.message, "error");
    }
  }
</script>
</body>
</html>
