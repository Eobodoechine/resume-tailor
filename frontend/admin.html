<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Resume Tailor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav>
  <a href="/dashboard" class="nav-brand">Resume Tailor</a>
  <div class="nav-links">
    <a href="/dashboard">Dashboard</a>
    <a href="/admin-panel" class="active">Admin</a>
    <a href="#" onclick="logout()">Sign Out</a>
  </div>
</nav>

<div class="container-wide">
  <div id="alert-box"></div>

  <div style="margin-bottom:24px;">
    <h1 style="font-size:22px;font-weight:700;color:var(--navy)">Access Requests</h1>
    <p style="color:var(--muted);font-size:14px;margin-top:4px;">Approve or reject people requesting access. Approving sends them a magic link immediately.</p>
  </div>

  <!-- Filter tabs -->
  <div style="display:flex;gap:8px;margin-bottom:16px;">
    <button class="btn btn-navy"    id="filter-pending"  onclick="loadRequests('pending')">Pending</button>
    <button class="btn btn-outline" id="filter-approved" onclick="loadRequests('approved')">Approved</button>
    <button class="btn btn-outline" id="filter-rejected" onclick="loadRequests('rejected')">Rejected</button>
    <button class="btn btn-outline" id="filter-all"      onclick="loadRequests('all')">All</button>
  </div>

  <div class="card" style="padding:0;overflow:hidden;">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Reason</th>
          <th>Requested</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="requests-body">
        <tr><td colspan="6" style="text-align:center;color:var(--muted);padding:24px;">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Users section -->
  <div style="margin-top:32px;margin-bottom:16px;">
    <h2 style="font-size:18px;font-weight:600;color:var(--navy)">Active Users</h2>
  </div>

  <div class="card" style="padding:0;overflow:hidden;">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Member Since</th>
        </tr>
      </thead>
      <tbody id="users-body">
        <tr><td colspan="3" style="text-align:center;color:var(--muted);padding:24px;">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="/static/app.js?v=10"></script>
<script>
  requireAuth();

  let currentFilter = "pending";

  async function loadRequests(filter = "pending") {
    currentFilter = filter;
    ["pending","approved","rejected","all"].forEach(f => {
      document.getElementById(`filter-${f}`).className =
        f === filter ? "btn btn-navy" : "btn btn-outline";
    });

    try {
      const data = await apiFetch(`/api/admin/requests?status=${filter}`);
      const tbody = document.getElementById("requests-body");

      if (!data.length) {
        // Build via DOM + textContent so `filter` can never inject markup (F2).
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = 6;
        td.style.cssText = "text-align:center;color:var(--muted);padding:20px";
        td.textContent = "No " + filter + " requests";
        tr.appendChild(td);
        tbody.innerHTML = "";
        tbody.appendChild(tr);
        return;
      }

      tbody.innerHTML = "";
      data.forEach(r => {
        const tr = document.createElement("tr");

        const tdName = document.createElement("td");
        tdName.style.fontWeight = "500";
        tdName.textContent = r.full_name || "—";

        const tdEmail = document.createElement("td");
        tdEmail.textContent = r.email;

        const tdReason = document.createElement("td");
        tdReason.style.cssText = "color:var(--muted);max-width:200px;overflow:hidden;text-overflow:ellipsis";
        tdReason.textContent = r.reason || "—";

        const tdDate = document.createElement("td");
        tdDate.style.color = "var(--muted)";
        tdDate.textContent = fmtDate(r.requested_at);

        const tdStatus = document.createElement("td");
        const badge = document.createElement("span");
        badge.className = `badge badge-${r.status}`;
        badge.textContent = r.status;
        tdStatus.appendChild(badge);

        const tdActions = document.createElement("td");
        tdActions.style.cssText = "text-align:right;white-space:nowrap;";
        if (r.status === "pending") {
          const btnApprove = document.createElement("button");
          btnApprove.className = "btn btn-success";
          btnApprove.style.cssText = "font-size:12px;padding:5px 10px;margin-right:6px";
          btnApprove.textContent = "Approve";
          btnApprove.dataset.id = r.id;
          btnApprove.addEventListener("click", () => approve(r.id));

          const btnReject = document.createElement("button");
          btnReject.className = "btn btn-danger";
          btnReject.style.cssText = "font-size:12px;padding:5px 10px";
          btnReject.textContent = "Reject";
          btnReject.dataset.id = r.id;
          btnReject.addEventListener("click", () => reject(r.id));

          tdActions.appendChild(btnApprove);
          tdActions.appendChild(btnReject);
        } else {
          tdActions.textContent = "—";
        }

        tr.append(tdName, tdEmail, tdReason, tdDate, tdStatus, tdActions);
        tbody.appendChild(tr);
      });
    } catch (e) {
      if (e && e.redirecting) return;
      showAlert("alert-box", e.message, "error");
    }
  }

  async function approve(id) {
    try {
      const res = await apiFetch("/api/admin/approve", { method: "POST", body: JSON.stringify({ request_id: id }) });
      showAlert("alert-box", `✓ ${res.message}`, "success");
      loadRequests(currentFilter);
    } catch (e) {
      if (e && e.redirecting) return;
      showAlert("alert-box", e.message, "error");
    }
  }

  async function reject(id) {
    if (!confirm("Reject this request?")) return;
    try {
      await apiFetch("/api/admin/reject", { method: "POST", body: JSON.stringify({ request_id: id }) });
      loadRequests(currentFilter);
    } catch (e) {
      if (e && e.redirecting) return;
      showAlert("alert-box", e.message, "error");
    }
  }

  async function loadUsers() {
    try {
      const users = await apiFetch("/api/admin/users");
      const tbody = document.getElementById("users-body");
      if (!users.length) {
        tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;color:var(--muted);padding:20px;">No users yet</td></tr>`;
        return;
      }
      tbody.innerHTML = "";
      users.forEach(u => {
        const tr = document.createElement("tr");
        const tdName = document.createElement("td");
        tdName.style.fontWeight = "500";
        tdName.textContent = u.full_name || "—";
        const tdEmail = document.createElement("td");
        tdEmail.textContent = u.email;
        const tdDate = document.createElement("td");
        tdDate.style.color = "var(--muted)";
        tdDate.textContent = fmtDate(u.created_at);
        tr.append(tdName, tdEmail, tdDate);
        tbody.appendChild(tr);
      });
    } catch (e) {
      if (e && e.redirecting) return;
      const errTbody = document.getElementById("users-body");
      errTbody.innerHTML = "";
      const tr = document.createElement("tr");
      const td = document.createElement("td");
      td.colSpan = 3;
      td.style.cssText = "text-align:center;color:var(--error);padding:20px;";
      td.textContent = `Failed to load users: ${e.message}`;
      tr.appendChild(td);
      errTbody.appendChild(tr);
    }
  }

  loadRequests("pending");
  loadUsers();
</script>
</body>
</html>
